services:
  postgres:
    image: postgres:17
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: udemy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - currency-network
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    restart: always
    ports:
      - "9411:9411"
    networks:
      - currency-network
  naming-server:
    build:
      context: .
      dockerfile: naming-server/Dockerfile
    mem_limit: 700m
    ports:
      - "8761:8761"
    networks:
      - currency-network
  currency-exchange-service:
    build:
      context: .
      dockerfile: currency-exchange-service/Dockerfile
    mem_limit: 700m
    ports:
      - "8000:8000"
    networks:
      - currency-network
    depends_on:
      - postgres
      - zipkin
      - naming-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
  currency-conversion-service:
    build:
      context: .
      dockerfile: currency-conversion-service/Dockerfile
    mem_limit: 700m
    ports:
      - "8010:8010"
    networks:
      - currency-network
    depends_on:
      - zipkin
      - naming-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    mem_limit: 700m
    ports:
      - "8765:8765"
    networks:
      - currency-network
    depends_on:
      - zipkin
      - naming-server
    environment:
      SPRING_PROFILES_ACTIVE: docker

volumes:
  postgres_data:

networks:
  currency-network:
    driver: bridge


