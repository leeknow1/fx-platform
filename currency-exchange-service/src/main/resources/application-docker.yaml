spring:
  application:
    name: currency-exchange-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:postgresql://postgres:5432/udemy
    username: postgres
    password: root
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8000

eureka:
  client:
    service-url:
      defaultZone: http://naming-server:8761/eureka

resilience4j:
  retry:
    instances:
      sample-api:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true

management:
  tracing:
    sampling:
      probability: 1

logging:
  pattern:
    level: "%5p [${spring.application.name}, %X{traceId:-}, %X{spanId:-}]"